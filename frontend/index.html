<!DOCTYPE html>
<html lang="en">
<head>
  <title>NDxB Bingo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta charset="UTF-8">

  <!-- Telegram Mini App SDK — MUST be first script -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

  <script>
    // Expand to full screen as early as possible, before the DOM loads
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();          // signal the app is ready
        tg.expand();         // expand to full height (removes bottom sheet)

        // requestFullscreen is available in Telegram ≥ 8.0 (2024+)
        if (typeof tg.requestFullscreen === "function") {
          tg.requestFullscreen();
        }

        // Prevent Telegram's swipe-to-close gesture from interfering
        if (typeof tg.disableClosingConfirmation === "function") {
          tg.disableClosingConfirmation();
        }

        // Lock orientation to portrait if supported
        if (tg.lockOrientation) {
          tg.lockOrientation();
        }

        // Use Telegram theme colours for the status bar area
        tg.setHeaderColor("#080818");
        tg.setBackgroundColor("#080818");
      }
    })();
  </script>
</head>
<body>

  <!-- Top bar: always visible, outside any wrapper -->
  <div class="top-fixed">
    <div class="brand-bar">
      <span class="brand-logo">
        <span class="logo-n">N</span><span class="logo-d">D</span><span class="logo-x">x</span><span class="logo-b">B</span>
      </span>
      <span class="brand-tagline">Bingo</span>
    </div>
    <div id="gameInfoBar" class="bottom-bar"></div>
  </div>

  <!-- Main content -->
  <div id="main-content">
    <div id="app"></div>
  </div>

  <!-- Card preview modal overlay -->
  <div id="cardPreviewOverlay" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal-box" id="cardPreviewModal">
      <button class="modal-close" onclick="closeCardPreview()">✕</button>
      <div id="selectedCardPreview"></div>
    </div>
  </div>

  <!-- Winner / Loser / notification popup -->
  <div id="popup" class="popup"></div>

  <div id="apps"></div>

  <script src="app.js"></script>
</body>
</html>

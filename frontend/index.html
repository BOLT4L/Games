<!DOCTYPE html>
<html lang="en">
<head>
  <title>NDxB Bingo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    // Request full screen and expand as early as possible
    if (window.Telegram && window.Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      if (typeof Telegram.WebApp.requestFullscreen === 'function') {
        Telegram.WebApp.requestFullscreen();
      }
    }
  </script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

<div id="scale-wrapper">

  <!-- Spacer: pushes content slightly below the very top -->
  <div class="top-spacer"></div>

  <!-- Top bar: game info -->
  <div class="top-fixed">
    <div class="brand-bar">
      <span class="brand-logo">ND<span class="brand-x">x</span>B</span>
      <span class="brand-tagline">Bingo</span>
    </div>
    <div id="gameInfoBar" class="bottom-bar"></div>
  </div>

  <div class="top-layout">
    <div>
      <div id="countdown"></div>
    </div>
  </div>

  <div id="app"></div>

  <!-- Card preview modal overlay -->
  <div id="cardPreviewOverlay" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal-box" id="cardPreviewModal">
      <button class="modal-close" onclick="closeCardPreview()">✕</button>
      <div id="selectedCardPreview"></div>
    </div>
  </div>

  <!-- Winner / Loser / notification popup -->
  <div id="popup" class="popup"></div>

</div>
<div id="apps"></div>

<script src="app.js"></script>
</body>
</html>

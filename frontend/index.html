<!DOCTYPE html>
<html lang="en">
<head>
  <title>NDxB Bingo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

<div id="scale-wrapper">

  <!-- Top bar: game info -->
  <div class="top-fixed">
    <div class="brand-bar">
      <span class="brand-logo">ND<span class="brand-x">x</span>B</span>
      <span class="brand-tagline">Bingo</span>
    </div>
    <div id="gameInfoBar" class="bottom-bar"></div>
  </div>

  <div class="top-layout">
    <div>
      <div id="countdown"></div>
    </div>
    <div id="selectedCardPreview"></div>
  </div>

  <div id="app"></div>
  <div id="popup" class="popup"></div>

</div>
<div id="apps"></div>

<script src="app.js"></script>
</body>
</html>
